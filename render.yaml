services:
  - type: web
    name: bloxygag-backend
    env: node
    repo: .
    branch: main
    autoDeploy: true
    buildCommand: cd Backend && npm ci && npm run build:frontend
    startCommand: cd Backend && npm run build:frontend && node ./bin/www
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: HCAPTCHA_SECRET
        sync: false
      - key: TRANSACTION_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: VITE_API_URL
        value: https://bloxygag-backend.onrender.com
        sync: false
      - key: VITE_SOCKET_URL
        value: https://bloxygag-backend.onrender.com
        sync: false
      - key: BOT_KEY
        sync: false
      - key: PORT
        sync: false
      - key: APIRONE_API_KEY
        sync: false
      - key: APIRONE_CALLBACK_SECRET
        sync: false

  - type: static
    name: bloxygag-frontend
    env: static
    repo: .
    branch: main
    autoDeploy: true
    buildCommand: cd Frontend && npm ci && npm run build
    publishPath: Frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: HCAPTCHA_SECRET
        sync: false
      - key: BOT_KEY
        sync: false
